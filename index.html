  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root,
    [data-theme="light"] {
      --color-bg:              #f7f6f2;
      --color-surface:         #f9f8f5;
      --color-surface-2:       #fbfbf9;
      --color-surface-offset:  #f3f0ec;
      --color-border:          #d4d1ca;
      --color-text:            #28251d;
      --color-text-muted:      #7a7976;
      --color-text-faint:      #aba9a3;
      --color-primary:         #0066ff;
      --color-primary-light:   #e6f0ff;
      --meta-theme:            #f7f6f2;

      --font-body: 'Satoshi', system-ui, -apple-system, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;

      --text-xs:   0.75rem;   /* 12px */
      --text-sm:   0.875rem;  /* 14px */
      --text-base: 1rem;      /* 16px */
      --text-lg:   1.125rem;  /* 18px */

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;

      --radius-sm:   6px;
      --radius-lg:   12px;
      --radius-full: 9999px;

      --shadow-sm: 0 2px 8px  rgba(0,0,0,0.04);
      --shadow-md: 0 6px 18px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);

      --transition: 150ms cubic-bezier(0.16,1,0.3,1);
    }

    [data-theme="dark"] {
      --color-bg:              #0f0f0e;
      --color-surface:         #1a1918;
      --color-surface-2:       #201f1d;
      --color-surface-offset:  #252422;
      --color-border:          #2e2d2b;
      --color-text:            #e8e7e4;
      --color-text-muted:      #7a7876;
      --color-text-faint:      #5a5955;
      --color-primary:         #6aa3ff;
      --color-primary-light:   #1a2d4d;
      --meta-theme:            #0f0f0e;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-4);
      /* Prevent layout shift from scrollbar appearing/disappearing */
      overflow-y: scroll;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button, a {
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    a { text-decoration: none; }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================
       SKIP LINK (accessibility)
       ============================================================ */
    .skip-link {
      position: absolute;
      left: -999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      left: var(--space-4);
      top: var(--space-4);
      width: auto;
      height: auto;
      padding: var(--space-2) var(--space-3);
      background: #000;
      color: #fff;
      z-index: 1000;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
    }

    /* ============================================================
       THEME TOGGLE
       ============================================================ */
    .theme-toggle {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      width: 40px;
      height: 40px;
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid color-mix(in oklch, var(--color-text) 10%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      transition: all var(--transition);
      cursor: pointer;
      z-index: 100;
    }
    .theme-toggle:hover {
      color: var(--color-text);
      background: var(--color-surface-2);
      box-shadow: var(--shadow-md);
    }
    .theme-toggle:active { transform: scale(0.95); }

    /* ============================================================
       PAGE LAYOUT
       ============================================================ */
    .page {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6);
    }

    /* ============================================================
       PROFILE
       ============================================================ */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding-top: var(--space-8);
      text-align: center;
    }

    /* Status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: color-mix(in oklch, var(--color-primary) 8%, transparent);
      border: 1px solid color-mix(in oklch, var(--color-primary) 20%, transparent);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: var(--space-1);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      min-width: 8px;
      border-radius: var(--radius-full);
      background: currentColor;
      animation: pulse 2s infinite;
    }
    .status-dot.offline {
      opacity: 0.5;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    /* Avatar */
    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: var(--radius-full);
      padding: 3px;
      background: linear-gradient(135deg in oklch, var(--color-primary), oklch(0.6 0.15 220));
      box-shadow: var(--shadow-md);
      /* Prevent avatar from being squished on narrow screens */
      flex-shrink: 0;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      object-fit: cover;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    /* Profile text */
    .profile-name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }
    .profile-handle {
      font-size: var(--text-sm);
      color: var(--color-primary);
      font-weight: 500;
    }
    .profile-bio {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 36ch;
      line-height: 1.6;
    }

    /* ============================================================
       SOCIAL ICONS
       ============================================================ */
    .socials {
      display: flex;
      gap: var(--space-3);
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      border: 1px solid color-mix(in oklch, var(--color-text) 8%, transparent);
      transition: all var(--transition);
      background: transparent;
    }
    .social-icon:hover {
      color: var(--color-text);
      background: var(--color-surface);
      border-color: color-mix(in oklch, var(--color-text) 20%, transparent);
      transform: translateY(-2px);
    }
    .social-icon svg { width: 16px; height: 16px; }

    /* ============================================================
       DIVIDER
       ============================================================ */
    .divider {
      width: 100%;
      height: 1px;
      background: color-mix(in oklch, var(--color-text) 8%, transparent);
    }

    /* ============================================================
       SECTION LABELS
       ============================================================ */
    .section-label {
      width: 100%;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      padding-left: var(--space-1);
      margin-bottom: calc(-1 * var(--space-2));
    }

    /* ============================================================
       LINK CARDS
       ============================================================ */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      background: var(--color-surface);
      border: 1px solid color-mix(in oklch, var(--color-text) 8%, transparent);
      border-radius: var(--radius-lg);
      transition: all var(--transition);
      overflow: hidden;
      /* Use <a> tag for navigation — no JS navigation fallback needed */
      text-decoration: none;
    }

    /* Ripple overlay */
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: color-mix(in oklch, var(--color-primary) 5%, transparent);
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .link-card:hover {
      background: var(--color-surface-2);
      border-color: color-mix(in oklch, var(--color-text) 14%, transparent);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .link-card:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }
    .link-card:hover::before { opacity: 1; }

    /* Featured variant */
    .link-card--featured {
      border-color: color-mix(in oklch, var(--color-primary) 30%, transparent);
      background: color-mix(in oklch, var(--color-primary) 4%, var(--color-surface));
    }
    .link-card--featured .link-icon {
      background: var(--color-primary);
      color: #fff;
    }

    /* Icon box */
    .link-icon {
      position: relative;
      z-index: 1;
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: color-mix(in oklch, var(--color-primary) 10%, transparent);
      color: var(--color-primary);
      flex-shrink: 0;
    }
    .link-icon svg { width: 20px; height: 20px; }

    /* Text */
    .link-text {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
      text-align: left;
    }
    .link-title {
      font-size: var(--text-sm);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      color: var(--color-text);
    }
    .link-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    /* Arrow */
    .link-arrow {
      position: relative;
      z-index: 1;
      color: var(--color-text-faint);
      transition: color var(--transition), transform var(--transition);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .link-card:hover .link-arrow {
      color: var(--color-primary);
      transform: translateX(3px);
    }
    .link-arrow svg { width: 16px; height: 16px; }

    /* Copy button */
    .copy-btn {
      position: relative;
      z-index: 2;
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: var(--radius-sm);
      background: color-mix(in oklch, var(--color-text) 8%, transparent);
      border: 1px solid color-mix(in oklch, var(--color-text) 12%, transparent);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      cursor: pointer;
      flex-shrink: 0;
    }
    .copy-btn:hover {
      background: color-mix(in oklch, var(--color-text) 12%, transparent);
      color: var(--color-text);
      border-color: color-mix(in oklch, var(--color-text) 20%, transparent);
    }
    .copy-btn:active { transform: scale(0.9); }
    .copy-btn svg { width: 14px; height: 14px; }
    /* Checkmark shown after copy */
    .copy-btn.copied { color: #22c55e; border-color: #22c55e; }

    /* ============================================================
       FOOTER
       ============================================================ */
    .footer {
      margin-top: var(--space-4);
      padding-bottom: var(--space-6);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-align: center;
    }

    /* ============================================================
       TOAST NOTIFICATION
       ============================================================ */
    .copy-feedback {
      position: fixed;
      bottom: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: var(--space-3) var(--space-4);
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: 500;
      opacity: 0;
      transition: opacity 250ms ease, transform 250ms ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }
    .copy-feedback.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       ENTRANCE ANIMATIONS
       ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* JS applies animation-delay per card via data-attr */
    .animate-in {
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      body { padding: var(--space-3) var(--space-3); }
      .theme-toggle { top: var(--space-3); right: var(--space-3); }
      .link-card { padding: var(--space-3) var(--space-4); gap: var(--space-3); }
    }
  </style>
</head>

    /* ================================================================
     * PAGE INIT
     * ================================================================ */
    (function () {

      /* ---------- Theme: apply before paint to avoid flash ---------- */
      function initTheme() {
        var toggle     = document.getElementById('themeToggle');
        var root       = document.documentElement;
        var moon       = document.getElementById('iconMoon');
        var sun        = document.getElementById('iconSun');
        var metaColor  = document.getElementById('metaThemeColor');
        var saved;
        try { saved = localStorage.getItem('site-theme'); } catch (e) {}
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');

        function applyTheme(t) {
          root.setAttribute('data-theme', t);
          var isDark = (t === 'dark');
          toggle.setAttribute('aria-label',   isDark ? 'Switch to light mode' : 'Switch to dark mode');
          toggle.setAttribute('aria-pressed', String(isDark));
          moon.style.display = isDark ? '' : 'none';
          sun.style.display  = isDark ? 'none' : '';
          // Update meta theme-color dynamically
          if (metaColor) metaColor.setAttribute('content', isDark ? '#0f0f0e' : '#f7f6f2');
          try { localStorage.setItem('site-theme', t); } catch (e) {}
        }

        applyTheme(theme);
        toggle.addEventListener('click', function () {
          applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        // Sync when OS preference changes (e.g., auto dark mode at sunset)
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
            var savedNow;
            try { savedNow = localStorage.getItem('site-theme'); } catch (ex) {}
            if (!savedNow) applyTheme(e.matches ? 'dark' : 'light');
          });
        }
      }

      /* ---------- Render avatar ---------- */
      function renderAvatar() {
        var av = CONFIG.profile.avatar;
        var el = document.getElementById('avatarEl');
        if (!el) return;
        // If it looks like a URL, render as <img>
        if (typeof av === 'string' && (av.startsWith('/') || av.startsWith('http'))) {
          var img = document.createElement('img');
          img.src = av;
          img.alt = CONFIG.profile.name;
          img.width = 82;
          img.height = 82;
          img.style.borderRadius = '50%';
          img.style.objectFit = 'cover';
          el.innerHTML = '';
          el.appendChild(img);
          el.removeAttribute('role');
        } else {
          el.textContent = av;
        }
      }

      /* ---------- Build profile ---------- */
      function initProfile() {
        document.getElementById('profileName').textContent   = CONFIG.profile.name;
        document.getElementById('profileHandle').textContent = CONFIG.profile.handle;
        document.getElementById('profileBio').textContent    = CONFIG.profile.bio;
        document.getElementById('footerText').textContent    =
          '\u00A9 ' + CONFIG.profile.year + ' ' + CONFIG.profile.name + ' \u00B7 vulkyri.com';

        // Status pill
        if (CONFIG.status) {
          var pill = document.getElementById('statusPill');
          var dot  = document.getElementById('statusDot');
          var txt  = document.getElementById('statusText');
          pill.style.display = 'flex';
          dot.className = 'status-dot' + (CONFIG.status.status === 'offline' ? ' offline' : '');
          txt.textContent = CONFIG.status.text;
        }

        // Socials
        var sc = document.getElementById('socialLinks');
        CONFIG.socials.forEach(function (s) {
          var a = document.createElement('a');
          a.href = s.url;
          a.className = 'social-icon';
          a.setAttribute('aria-label', s.label);
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
          a.innerHTML = s.svg;
          sc.appendChild(a);
        });
      }

      /* ---------- Resolve icon to HTML string ---------- */
      function iconHTML(icon) {
        if (ICONS[icon]) return ICONS[icon];
        // Treat as emoji / text
        return '<span aria-hidden="true">' + icon + '</span>';
      }

      /* ---------- Build a link card ---------- */
      function createLinkCard(linkData, isFeatured) {
        var card = document.createElement('a');
        card.href      = linkData.url;
        card.className = 'link-card animate-in' + (isFeatured ? ' link-card--featured' : '');
        card.setAttribute('target', '_blank');
        card.setAttribute('rel', 'noopener noreferrer');
        card.style.animationDelay = (linkData.delay || 0) + 's';

        var copyBtnHTML = '';
        if (linkData.copyable) {
          copyBtnHTML = '<button type="button" class="copy-btn" ' +
            'title="' + linkData.copyable.label + '" ' +
            'aria-label="' + linkData.copyable.label + '">' +
            ICONS.copy + '</button>';
        }

        card.innerHTML =
          '<span class="link-icon" aria-hidden="true">' + iconHTML(linkData.icon) + '</span>' +
          '<span class="link-text">' +
            '<span class="link-title">'  + escapeHTML(linkData.title)       + '</span>' +
            '<span class="link-desc">'   + escapeHTML(linkData.description) + '</span>' +
          '</span>' +
          copyBtnHTML +
          '<span class="link-arrow" aria-hidden="true">' + ICONS.arrow + '</span>';

        // Copy button logic
        if (linkData.copyable) {
          var btn = card.querySelector('.copy-btn');
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            copyToClipboard(linkData.copyable.value, btn);
          });
        }

        // Middle-click or Ctrl/Cmd+click → copy URL
        card.addEventListener('mousedown', function (e) {
          if (e.button === 1) {
            e.preventDefault();
            copyToClipboard(linkData.url);
          }
        });

        return card;
      }

      /* ---------- Build links section ---------- */
      function initLinks() {
        var container = document.getElementById('linksContainer');

        function addLabel(text, mt) {
          var p = document.createElement('p');
          p.className = 'section-label';
          p.textContent = text;
          if (mt) p.style.marginTop = 'var(--space-2)';
          container.appendChild(p);
        }

        if (CONFIG.featuredLinks.length) {
          addLabel('Featured', false);
          CONFIG.featuredLinks.forEach(function (l) {
            container.appendChild(createLinkCard(l, true));
          });
        }
        if (CONFIG.links.length) {
          addLabel('Links', CONFIG.featuredLinks.length > 0);
          CONFIG.links.forEach(function (l) {
            container.appendChild(createLinkCard(l, false));
          });
        }
      }

      /* ---------- Clipboard ---------- */
      var _copyTimer = null;
      function copyToClipboard(text, btn) {
        var feedback = document.getElementById('copyFeedback');

        function onSuccess() {
          feedback.textContent = '\u2713 Copied!';
          feedback.classList.add('show');
          if (_copyTimer) clearTimeout(_copyTimer);
          _copyTimer = setTimeout(function () {
            feedback.classList.remove('show');
          }, 2000);

          // Visual feedback on copy button
          if (btn) {
            btn.classList.add('copied');
            btn.innerHTML = ICONS.check;
            setTimeout(function () {
              btn.classList.remove('copied');
              btn.innerHTML = ICONS.copy;
            }, 2000);
          }
        }

        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try { document.execCommand('copy'); } catch (_) {}
          document.body.removeChild(ta);
          onSuccess();
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(onSuccess, fallback);
        } else {
          fallback();
        }
      }

      /* ---------- Helpers ---------- */
      function escapeHTML(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ---------- Boot ---------- */
      // initTheme runs immediately (avoids flash)
      initTheme();

      document.addEventListener('DOMContentLoaded', function () {
        renderAvatar();
        initProfile();
        initLinks();
      });

    }());
  </script>
