    :root,[data-theme="light"]{

      padding:var(--space-4);overflow-y:scroll;
    }
    img{display:block;max-width:100%;}
    button,a{cursor:pointer;font:inherit;color:inherit;}
    a{text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

    }
    .header-controls{
      position:fixed;top:var(--space-4);right:var(--space-4);
      display:flex;gap:var(--space-2);align-items:center;z-index:100;
    }
    .theme-toggle,.color-theme-select{
      height:40px;border-radius:var(--radius-lg);
      background:var(--color-surface);
      border:1px solid color-mix(in oklch,var(--color-text) 10%,transparent);
      display:flex;align-items:center;justify-content:center;
      color:var(--color-text-muted);transition:all var(--transition);cursor:pointer;
    }
    .theme-toggle{width:40px;}
    .color-theme-select{padding:0 var(--space-3);font-size:var(--text-xs);font-weight:600;appearance:none;-webkit-appearance:none;outline:none;}
    .theme-toggle:hover,.color-theme-select:hover{color:var(--color-text);background:var(--color-surface-2);box-shadow:var(--shadow-md);}
    .theme-toggle:active{transform:scale(.95);}
    .page{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:var(--space-6);}
    .profile{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding-top:var(--space-8);text-align:center;}
    .status-pill{
      display:flex;align-items:center;gap:var(--space-2);
      padding:var(--space-2) var(--space-3);
      background:color-mix(in oklch,var(--color-primary) 8%,transparent);
      border:1px solid color-mix(in oklch,var(--color-primary) 20%,transparent);
      border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;
      color:var(--color-primary);margin-bottom:var(--space-1);
    }
    .status-dot{width:8px;height:8px;min-width:8px;border-radius:var(--radius-full);background:currentColor;animation:pulse 2s infinite;}
    .status-dot.offline{opacity:.5;animation:none;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
    .avatar-ring{
      width:88px;height:88px;border-radius:var(--radius-full);padding:3px;
      background:conic-gradient(var(--color-primary),oklch(.6 .15 220),var(--color-primary));
      box-shadow:var(--shadow-md);flex-shrink:0;animation:ring-spin 4s linear infinite;
    }
    @keyframes ring-spin{to{rotate:360deg;}}
    .avatar{
      width:100%;height:100%;border-radius:var(--radius-full);
      background:var(--color-surface-offset);object-fit:cover;overflow:hidden;
      display:flex;align-items:center;justify-content:center;font-size:2.5rem;
    }
    .profile-name{font-size:var(--text-lg);font-weight:700;color:var(--color-text);letter-spacing:-.02em;}
    .profile-handle{font-size:var(--text-sm);color:var(--color-primary);font-weight:500;}
    .profile-bio{font-size:var(--text-sm);color:var(--color-text-muted);max-width:36ch;line-height:1.6;}
    .socials{display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap;justify-content:center;}
    .social-icon{
      width:36px;height:36px;border-radius:var(--radius-full);
      display:flex;align-items:center;justify-content:center;
      color:var(--color-text-muted);
      border:1px solid color-mix(in oklch,var(--color-text) 8%,transparent);
      transition:all var(--transition);background:transparent;
    }
    .social-icon:hover{color:var(--color-text);background:var(--color-surface);border-color:color-mix(in oklch,var(--color-text) 20%,transparent);transform:translateY(-2px);}

    .divider{width:100%;height:1px;background:color-mix(in oklch,var(--color-text) 8%,transparent);}
    .search-container{width:100%;}
    .search-input{

      background:var(--color-surface);

      border-radius:var(--radius-lg);font-size:var(--text-sm);color:var(--color-text);
      transition:all var(--transition);
    }
    .search-input:focus{

      box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 15%,transparent);
    }
    .section-label{
      width:100%;font-size:var(--text-xs);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;
      color:var(--color-text-faint);padding-left:var(--space-1);
      margin-bottom:calc(-1 * var(--space-2));
    }
    .links{width:100%;display:flex;flex-direction:column;gap:var(--space-3);}
    .link-card{
      position:relative;display:flex;align-items:center;gap:var(--space-4);
      padding:var(--space-4) var(--space-5);
      background:var(--color-surface);
      border:1px solid color-mix(in oklch,var(--color-text) 8%,transparent);
      border-radius:var(--radius-lg);transition:all var(--transition);
      overflow:hidden;text-decoration:none;color:inherit;
    }
    .link-card::before{
      content:'';position:absolute;inset:0;opacity:0;
      background:color-mix(in oklch,var(--color-primary) 5%,transparent);
      transition:opacity var(--transition);pointer-events:none;
    }
    .link-card:hover{background:var(--color-surface-2);border-color:color-mix(in oklch,var(--color-text) 14%,transparent);box-shadow:var(--shadow-md);transform:translateY(-1px);}
    .link-card:active{transform:translateY(0);box-shadow:var(--shadow-sm);}
    .link-card:hover::before{opacity:1;}
    .link-card--featured{border-color:color-mix(in oklch,var(--color-primary) 30%,transparent);background:color-mix(in oklch,var(--color-primary) 4%,var(--color-surface));}
    .link-card--featured .link-icon{background:var(--color-primary);color:#fff;}
    .link-icon{
      position:relative;z-index:1;width:40px;height:40px;min-width:40px;
      border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;background:color-mix(in oklch,var(--color-primary) 10%,transparent);
      color:var(--color-primary);flex-shrink:0;
    }
    .link-icon svg{width:20px;height:20px;}
    .link-text{flex:1;min-width:0;position:relative;z-index:1;text-align:left;}
    .link-title{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;color:var(--color-text);}
    .link-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
    .link-badge{
      position:relative;z-index:1;
      font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      padding:2px 7px;border-radius:var(--radius-full);
      background:color-mix(in oklch,var(--color-primary) 15%,transparent);
      color:var(--color-primary);border:1px solid color-mix(in oklch,var(--color-primary) 25%,transparent);
      white-space:nowrap;flex-shrink:0;
    }
    .link-arrow{
      position:relative;z-index:1;color:var(--color-text-faint);
      transition:color var(--transition),transform var(--transition);
      flex-shrink:0;display:flex;align-items:center;
    }
    .link-card:hover .link-arrow{color:var(--color-primary);transform:translateX(3px);}
    .link-arrow svg{width:16px;height:16px;}
    .copy-btn{
      position:relative;z-index:2;width:32px;height:32px;min-width:32px;
      border-radius:var(--radius-sm);
      background:color-mix(in oklch,var(--color-text) 8%,transparent);
      border:1px solid color-mix(in oklch,var(--color-text) 12%,transparent);
      color:var(--color-text-muted);display:flex;align-items:center;justify-content:center;
      transition:all var(--transition);cursor:pointer;flex-shrink:0;
    }
    .copy-btn:hover{background:color-mix(in oklch,var(--color-text) 12%,transparent);color:var(--color-text);border-color:color-mix(in oklch,var(--color-text) 20%,transparent);}
    .copy-btn:active{transform:scale(.9);}
    .copy-btn svg{width:14px;height:14px;}
    .copy-btn.copied{color:#22c55e;border-color:#22c55e;}
    .qr-section{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);opacity:.6;transition:opacity var(--transition);}

    .qr-section img{width:100px;height:100px;border-radius:var(--radius-sm);}
    .qr-label{font-size:var(--text-xs);color:var(--color-text-faint);}

    }

    .updates-title-row{display:flex;align-items:center;gap:var(--space-2);}
    .updates-icon{font-size:1rem;}
    .updates-heading{font-size:var(--text-sm);font-weight:700;color:var(--color-text);}

    .updates-see-all:hover{text-decoration:underline;}
    .update-item{display:flex;flex-direction:column;gap:2px;}
    .update-item+.update-item{padding-top:var(--space-3);border-top:1px solid color-mix(in oklch,var(--color-text) 6%,transparent);}
    .update-meta{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);}
    .update-text{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5;}
    .footer{margin-top:var(--space-4);padding-bottom:var(--space-6);font-size:var(--text-xs);color:var(--color-text-faint);text-align:center;}
    .footer-links{display:flex;gap:var(--space-4);justify-content:center;margin-top:var(--space-2);}
    .footer-links a{font-size:var(--text-xs);color:var(--color-text-faint);transition:color var(--transition);}
    .footer-links a:hover{color:var(--color-primary);}
    .copy-feedback{
      position:fixed;bottom:var(--space-6);left:50%;
      transform:translateX(-50%) translateY(8px);
      padding:var(--space-3) var(--space-4);
      background:var(--color-text);color:var(--color-bg);
      border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:500;
      opacity:0;transition:opacity 250ms ease,transform 250ms ease;
      pointer-events:none;z-index:999;white-space:nowrap;box-shadow:var(--shadow-lg);
    }
    .copy-feedback.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .animate-in{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;}
    @media(max-width:480px){
      body{padding:var(--space-3);}
      .header-controls{top:var(--space-3);right:var(--space-3);}
      .link-card{padding:var(--space-3) var(--space-4);gap:var(--space-3);}
    }
  </style>

    var _copyTimer=null;
    function isScheduled(l){var n=Date.now();if(l.startAt&&new Date(l.startAt)>n)return false;if(l.endAt&&new Date(l.endAt)<n)return false;if(l.visibleFrom&&new Date(l.visibleFrom)>n)return false;if(l.visibleUntil&&new Date(l.visibleUntil)<n)return false;if(l.visible===false)return false;return true;}
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);var toggle=document.getElementById('themeToggle'),moon=document.getElementById('iconMoon'),sun=document.getElementById('iconSun'),meta=document.getElementById('metaThemeColor');if(!toggle)return;if(t==='dark'){moon.style.display='';sun.style.display='none';toggle.setAttribute('aria-label','Switch to light mode');toggle.setAttribute('aria-pressed','true');if(meta)meta.setAttribute('content','#0f0f0e');}else{moon.style.display='none';sun.style.display='';toggle.setAttribute('aria-label','Switch to dark mode');toggle.setAttribute('aria-pressed','false');if(meta)meta.setAttribute('content','#f7f6f2');}try{localStorage.setItem('theme',t);}catch(_){}}
    function initTheme(){var s=null;try{s=localStorage.getItem('theme');}catch(_){}applyTheme(s||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));var t=document.getElementById('themeToggle');if(t)t.addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});}
    function applyColorTheme(n){document.documentElement.setAttribute('data-color-theme',n==='original'?'':n);try{localStorage.setItem('color-theme',n);}catch(_){}}
    function initColorTheme(){var s=null;try{s=localStorage.getItem('color-theme');}catch(_){}var sel=document.getElementById('colorThemeSelect');if(!sel)return;var t=s||'original';sel.value=t;applyColorTheme(t);sel.addEventListener('change',function(e){applyColorTheme(e.target.value);});}
    function renderAvatar(){var el=document.getElementById('avatarEl');if(!el)return;var av=CONFIG.profile.avatar;if(typeof av==='string'&&(av.startsWith('http')||av.startsWith('/'))){var img=document.createElement('img');img.src=av;img.alt=CONFIG.profile.name+"'s profile picture";img.style.cssText='width:100%;height:100%;border-radius:9999px;object-fit:cover';el.textContent='';el.appendChild(img);}else{el.textContent=av;}}
    function initProfile(){var p=CONFIG.profile,el;if((el=document.getElementById('profileName')))el.textContent=p.name;if((el=document.getElementById('profileHandle')))el.textContent=p.handle;if((el=document.getElementById('profileBio')))el.textContent=p.bio;if((el=document.getElementById('footerText')))el.textContent='\u00A9 '+p.year+' '+p.name+' \u00B7 vulkyri.com';if(CONFIG.status){var pill=document.getElementById('statusPill'),dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');if(pill&&dot&&txt){pill.style.display='flex';txt.textContent=CONFIG.status.text;if(CONFIG.status.status==='offline')dot.classList.add('offline');}}var nav=document.getElementById('socialLinks');if(nav)CONFIG.socials.forEach(function(s){var a=document.createElement('a');a.href=s.url;a.className='social-icon';a.setAttribute('aria-label',s.label+' profile');a.setAttribute('rel','noopener noreferrer');a.setAttribute('target','_blank');a.innerHTML=s.svg;nav.appendChild(a);});}
    function initSearch(all){if(!CONFIG.features.search||all.length<4)return;var c=document.getElementById('searchContainer'),i=document.getElementById('searchInput');if(!c||!i)return;c.style.display='block';i.addEventListener('input',function(e){renderLinks(e.target.value);});}
    function renderCountdown(){if(!CONFIG.countdown)return;var cd=CONFIG.countdown,target=new Date(cd.target).getTime();if(isNaN(target)||target<Date.now())return;var container=document.getElementById('linksContainer');if(!container)return;var card=document.createElement('div');card.className='countdown-card animate-in';card.style.animationDelay='.02s';card.innerHTML='<span class="countdown-label">'+(cd.label||'Coming soon')+'</span><span class="countdown-title">'+(cd.title||'')+'</span><div class="countdown-digits" id="cdDigits"></div>';container.prepend(card);function tick(){var diff=Math.max(0,target-Date.now()),d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000),el=document.getElementById('cdDigits');if(!el)return;el.innerHTML=[[d,'Days'],[h,'Hrs'],[m,'Min'],[s,'Sec']].map(function(u){return'<div class="countdown-unit"><span class="countdown-num">'+String(u[0]).padStart(2,'0')+'</span><span class="countdown-sub">'+u[1]+'</span></div>';}).join('');if(diff>0)setTimeout(tick,1000);}tick();}
    function renderUpdates(){if(!CONFIG.updates||!CONFIG.updates.length)return;var container=document.getElementById('linksContainer');if(!container)return;var card=document.createElement('div');card.className='updates-card animate-in';card.style.animationDelay='.3s';var h='<div class="updates-header"><div class="updates-title-row"><span class="updates-icon">📣</span><span class="updates-heading">Updates</span></div><a class="updates-see-all" href="/updates">See all</a></div>';var items=CONFIG.updates.slice(0,3).map(function(u){return'<div class="update-item"><span class="update-meta">'+u.date+'</span><span class="update-text">'+u.text+'</span></div>';}).join('');card.innerHTML=h+items;container.appendChild(card);}

    function trackClick(title){if(!CONFIG.features.trackClicks)return;try{var c=JSON.parse(localStorage.getItem('link-clicks')||'{}');c[title]=(c[title]||0)+1;localStorage.setItem('link-clicks',JSON.stringify(c));}catch(_){}if(CONFIG.features.analytics&&window.gtag)window.gtag('event','link_click',{link_title:title});}
    function createLinkCard(l,featured){var card=document.createElement('a');card.href=l.url;card.className='link-card animate-in'+(featured?' link-card--featured':'');card.setAttribute('rel','noopener noreferrer');card.setAttribute('target','_blank');card.style.animationDelay=(l.delay||0)+'s';card.setAttribute('aria-label',l.title+(l.description?' — '+l.description:''));card.addEventListener('click',function(){trackClick(l.title);});var icon=document.createElement('div');icon.className='link-icon';icon.setAttribute('aria-hidden','true');if(l.icon==='gh')icon.innerHTML=ICONS.github;else if(l.icon==='x')icon.innerHTML=ICONS.x;else icon.textContent=l.icon||'🔗';card.appendChild(icon);var text=document.createElement('div');text.className='link-text';var title=document.createElement('span');title.className='link-title';title.textContent=l.title;var desc=document.createElement('span');desc.className='link-desc';desc.textContent=l.description||'';text.appendChild(title);text.appendChild(desc);card.appendChild(text);if(l.badge){var badge=document.createElement('span');badge.className='link-badge';badge.textContent=l.badge;card.appendChild(badge);}if(l.copyable){var btn=document.createElement('button');btn.type='button';btn.className='copy-btn';btn.setAttribute('aria-label',l.copyable.label||'Copy');btn.innerHTML=ICONS.copy;btn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();copyToClipboard(l.copyable.value,btn);});card.appendChild(btn);}var arrow=document.createElement('span');arrow.className='link-arrow';arrow.setAttribute('aria-hidden','true');arrow.innerHTML=ICONS.arrow;card.appendChild(arrow);return card;}
    function renderLinks(term){var container=document.getElementById('linksContainer');if(!container)return;container.innerHTML='';var t=(term||'').toLowerCase(),featured=(CONFIG.featuredLinks||[]).filter(isScheduled),links=(CONFIG.links||[]).filter(isScheduled);if(t){featured=featured.filter(function(l){return(l.title+' '+(l.description||'')).toLowerCase().includes(t);});links=links.filter(function(l){return(l.title+' '+(l.description||'')).toLowerCase().includes(t);});}function label(txt,mt){var p=document.createElement('p');p.className='section-label';p.textContent=txt;if(mt)p.style.marginTop='var(--space-2)';container.appendChild(p);}if(featured.length){label('Featured',false);featured.forEach(function(l){container.appendChild(createLinkCard(l,true));});}if(links.length){label('Links',featured.length>0);links.forEach(function(l){container.appendChild(createLinkCard(l,false));});}if(!featured.length&&!links.length&&term){var msg=document.createElement('p');msg.style.cssText='text-align:center;color:var(--color-text-muted);margin-top:var(--space-4)';msg.textContent='No links found for "'+term+'"';container.appendChild(msg);}}
    function copyToClipboard(text,btn){function ok(){var fb=document.getElementById('copyFeedback');if(fb){fb.classList.add('show');if(_copyTimer)clearTimeout(_copyTimer);_copyTimer=setTimeout(function(){fb.classList.remove('show');},2000);}if(btn){btn.classList.add('copied');btn.innerHTML=ICONS.check;setTimeout(function(){btn.classList.remove('copied');btn.innerHTML=ICONS.copy;},2000);}}function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;pointer-events:none';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(ta);ok();}if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(ok,fb);else fb();}
    function initAnalytics(){if(!CONFIG.features.analytics)return;var id=CONFIG.features.analytics,s=document.createElement('script');s.async=true;s.src='https://www.googletagmanager.com/gtag/js?id='+id;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];window.gtag=function(){window.dataLayer.push(arguments);};window.gtag('js',new Date());window.gtag('config',id);}
    function loadRemoteConfig(cb){fetch('/api/config',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(remote){if(remote){if(remote.profile)Object.assign(CONFIG.profile,remote.profile);if(remote.status!==undefined)CONFIG.status=remote.status;if(remote.countdown)CONFIG.countdown=remote.countdown;if(remote.updates)CONFIG.updates=remote.updates;if(remote.featuredLinks)CONFIG.featuredLinks=remote.featuredLinks;if(remote.links)CONFIG.links=remote.links;}cb();}).catch(function(){cb();});}
