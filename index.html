<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Links</title>
  <meta name="description" content="All my links in one place." />
  <link rel="canonical" href="https://yourdomain.example/" />
  <meta name="theme-color" content="#0f0f0e" />
  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Your Links" />
  <meta property="og:description" content="All my links in one place." />
  <meta property="og:url" content="https://yourdomain.example/" />
  <meta property="og:image" content="https://yourdomain.example/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Your Links" />
  <meta name="twitter:description" content="All my links in one place." />
  <meta name="twitter:image" content="https://yourdomain.example/og-image.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root,[data-theme="light"]{--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#7a7976;--color-text-faint:#aba9a3;--color-primary:#0066ff;--color-primary-light:#e6f0ff;--font-body:'Satoshi',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--text-base:16px;--text-sm:14px;--text-xs:12px;--text-lg:18px;--space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--radius-sm:6px;--radius-lg:12px;--radius-full:9999px;--shadow-sm:0 2px 8px rgba(0,0,0,0.04);--shadow-md:0 6px 18px rgba(0,0,0,0.08);--shadow-lg:0 12px 32px rgba(0,0,0,0.12);--transition-interactive:150ms cubic-bezier(0.16,1,0.3,1)}[data-theme="dark"]{--color-bg:#0f0f0e;--color-surface:#1a1918;--color-surface-2:#201f1d;--color-surface-offset:#252422;--color-border:#2e2d2b;--color-text:#e8e7e4;--color-text-muted:#7a7876;--color-text-faint:#5a5955;--color-primary:#6aa3ff;--color-primary-light:#1a2d4d}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background-color:var(--color-bg);display:flex;flex-direction:column;align-items:center;padding:var(--space-4)}img{display:block;max-width:100%}button,a{cursor:pointer;font:inherit;color:inherit}a{text-decoration:none}:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}.skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}.skip-link:focus{left:var(--space-4);top:var(--space-4);width:auto;height:auto;padding:var(--space-2) var(--space-3);background:#000;color:#fff;z-index:1000;border-radius:var(--radius-sm);font-size:var(--text-sm)}.theme-toggle{position:fixed;top:var(--space-4);right:var(--space-4);width:40px;height:40px;border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h / 0.1);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:all var(--transition-interactive);cursor:pointer}.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-2);box-shadow:var(--shadow-md)}.theme-toggle:active{transform:scale(0.95)}.page{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:var(--space-6)}.profile{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding-top:var(--space-8);text-align:center}.status-pill{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);background:oklch(from var(--color-primary) l c h / 0.08);border:1px solid oklch(from var(--color-primary) l c h / 0.2);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;color:var(--color-primary);margin-bottom:var(--space-1)}.status-dot{width:8px;height:8px;border-radius:var(--radius-full);background:currentColor;animation:pulse 2s infinite}.status-dot.offline{opacity:0.5;animation:none}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}.avatar-ring{width:88px;height:88px;border-radius:var(--radius-full);padding:3px;background:linear-gradient(135deg in oklch,var(--color-primary),oklch(0.6 0.15 220));box-shadow:var(--shadow-md)}.avatar{width:100%;height:100%;border-radius:var(--radius-full);background:var(--color-surface-offset);object-fit:cover;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.5rem}.profile-name{font-size:var(--text-lg);font-weight:700;color:var(--color-text);letter-spacing:-0.02em}.profile-handle{font-size:var(--text-sm);color:var(--color-primary);font-weight:500}.profile-bio{font-size:var(--text-sm);color:var(--color-text-muted);max-width:36ch;line-height:1.6}.socials{display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap;justify-content:center}.social-icon{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border:1px solid oklch(from var(--color-text) l c h / 0.08);transition:all var(--transition-interactive);background:transparent}.social-icon:hover{color:var(--color-text);background:var(--color-surface);border-color:oklch(from var(--color-text) l c h / 0.2);transform:translateY(-2px)}.social-icon svg{width:16px;height:16px}.divider{width:100%;height:1px;background:oklch(from var(--color-text) l c h / 0.08)}.section-label{width:100%;font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-faint);padding-left:var(--space-1);margin-bottom:calc(-1 * var(--space-2))}.links{width:100%;display:flex;flex-direction:column;gap:var(--space-3)}.link-card{position:relative;display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-5);background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h / 0.08);border-radius:var(--radius-lg);transition:all var(--transition-interactive);overflow:hidden;cursor:pointer;user-select:none}.link-card::before{content:'';position:absolute;inset:0;opacity:0;background:oklch(from var(--color-primary) l c h / 0.05);transition:opacity var(--transition-interactive)}.link-card:hover{background:var(--color-surface-2);border-color:oklch(from var(--color-text) l c h / 0.14);box-shadow:var(--shadow-md);transform:translateY(-1px)}.link-card:active{background:oklch(from var(--color-surface) l c h / 0.85);transform:translateY(0);box-shadow:var(--shadow-sm)}.link-card:hover::before{opacity:1}.link-card:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}.link-icon{position:relative;z-index:1;width:40px;height:40px;min-width:40px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:oklch(from var(--color-primary) l c h / 0.1);color:var(--color-primary);flex-shrink:0}.link-icon svg{width:20px;height:20px}.link-text{flex:1;min-width:0;position:relative;z-index:1;text-align:left}.link-title{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}.link-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}.link-arrow{position:relative;z-index:1;color:var(--color-text-faint);transition:color var(--transition-interactive),transform var(--transition-interactive);flex-shrink:0}.link-card:hover .link-arrow{color:var(--color-primary);transform:translateX(2px)}.link-arrow svg{width:16px;height:16px}.link-card--featured{border-color:oklch(from var(--color-primary) l c h / 0.3);background:oklch(from var(--color-primary) l c h / 0.04)}.link-card--featured .link-icon{background:var(--color-primary);color:#fff}.copy-btn{position:relative;z-index:2;width:32px;height:32px;min-width:32px;border-radius:var(--radius-sm);background:oklch(from var(--color-text) l c h / 0.08);border:1px solid oklch(from var(--color-text) l c h / 0.12);color:var(--color-text-muted);display:flex;align-items:center;justify-content:center;transition:all var(--transition-interactive);cursor:pointer;flex-shrink:0}.copy-btn:hover{background:oklch(from var(--color-text) l c h / 0.12);color:var(--color-text);border-color:oklch(from var(--color-text) l c h / 0.2)}.copy-btn:active{transform:scale(0.9)}.copy-btn svg{width:14px;height:14px}.footer{margin-top:var(--space-4);font-size:var(--text-xs);color:var(--color-text-faint)}.copy-feedback{position:fixed;bottom:var(--space-4);left:50%;transform:translateX(-50%);padding:var(--space-3) var(--space-4);background:#000;color:#fff;border-radius:var(--radius-sm);font-size:var(--text-sm);opacity:0;transition:opacity 300ms ease;pointer-events:none;z-index:999}.copy-feedback.show{opacity:1}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.profile{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both}.link-card{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>

  <main class="page" id="main" role="main">
    <!-- ================================================================
         PROFILE SECTION: Edit name, handle, bio, avatar
         ================================================================ -->
    <section class="profile" aria-label="Profile">
      <!-- STATUS PILL: Shows online/offline status. Edit CONFIG.status to toggle -->
      <div id="statusPill" class="status-pill" style="display:none;">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText"></span>
      </div>

      <div class="avatar-ring">
        <div class="avatar" role="img" aria-label="Profile picture">😊</div>
      </div>
      <div>
        <h1 class="profile-name" id="profileName">Your Name</h1>
        <p class="profile-handle" id="profileHandle">@yourhandle</p>
      </div>
      <p class="profile-bio" id="profileBio">Developer · Designer · Creator. Building things on the internet.</p>
      <div class="socials" aria-label="Social profiles" id="socialLinks">
        <!-- Socials will be generated from config -->
      </div>
    </section>

    <div class="divider" role="separator"></div>

    <!-- ================================================================
         LINKS SECTION: Edit CONFIG.links array to add/remove links
         ================================================================ -->
    <nav class="links" id="linksContainer" aria-label="My links">
      <!-- Links will be generated from config -->
    </nav>

    <footer class="footer" role="contentinfo">
      <p id="footerText">© 2026 Your Name · Hosted on Cloudflare Pages</p>
    </footer>
  </main>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Your Name",
      "url": "https://yourdomain.example/",
      "sameAs": ["https://twitter.com/yourhandle","https://github.com/yourhandle"]
    }
  </script>

  <script>
    /* ================================================================
     * 🎨 EDIT ME: Configuration
     * ================================================================
     * This is your quick checklist. Just edit the CONFIG object below.
     * Everything else is auto-generated from these settings.
     */

    const CONFIG = {
      // Profile information
      profile: {
        name: "Your Name",
        handle: "@yourhandle",
        bio: "Developer · Designer · Creator. Building things on the internet.",
        avatar: "😊", // Can be emoji or image URL
        year: new Date().getFullYear(),
      },

      // Status indicator (appears as a colored pill above profile)
      // Set to null to hide, or { status: 'online'|'offline', text: 'Your text' }
      status: { status: "online", text: "Available for projects" },
      // status: null, // Uncomment to hide

      // Social links - add or remove as needed
      // Format: { icon: 'emoji', label: 'display name', url: 'https://...' }
      socials: [
        { icon: "𝕏", label: "Twitter / X", url: "https://twitter.com/yourhandle" },
        { icon: "🐙", label: "GitHub", url: "https://github.com/yourhandle" },
        { icon: "💼", label: "LinkedIn", url: "https://linkedin.com/in/yourhandle" },
        { icon: "📷", label: "Instagram", url: "https://instagram.com/yourhandle" },
        { icon: "▶️", label: "YouTube", url: "https://youtube.com/@yourhandle" },
      ],

      // Featured links (appear first with special styling)
      featuredLinks: [
        {
          title: "My Latest Project",
          description: "Check out what I've been building",
          icon: "🏆",
          url: "https://yourdomain.example/project",
          delay: 0.05,
        },
      ],

      // Regular links
      links: [
        {
          title: "My Portfolio",
          description: "Work, case studies & experiments",
          icon: "💼",
          url: "https://yourdomain.example/portfolio",
          delay: 0.1,
          // optional: copyable: { value: '@yourhandle', label: 'Copy username' }
        },
        {
          title: "Newsletter",
          description: "Weekly thoughts on tech & design",
          icon: "✉️",
          url: "https://newsletter.example",
          delay: 0.15,
        },
        {
          title: "WhatsApp",
          description: "Message me on WhatsApp",
          icon: "💬",
          url: "https://wa.me/1234567890",
          delay: 0.2,
          copyable: { value: "+1 (234) 567-8900", label: "Copy number" },
        },
        {
          title: "Telegram",
          description: "Connect on Telegram",
          icon: "📱",
          url: "https://t.me/yourhandle",
          delay: 0.25,
          copyable: { value: "@yourhandle", label: "Copy username" },
        },
        {
          title: "Support My Work",
          description: "Buy me a coffee ☕",
          icon: "❤️",
          url: "https://buymeacoffee.com/yourhandle",
          delay: 0.3,
        },
      ],
    };

    /* ================================================================
     * Page Initialization - No need to edit below
     * ================================================================ */

    function initPage() {
      // Set profile info
      document.getElementById("profileName").textContent = CONFIG.profile.name;
      document.getElementById("profileHandle").textContent = CONFIG.profile.handle;
      document.getElementById("profileBio").textContent = CONFIG.profile.bio;
      document.getElementById("footerText").textContent = `© ${CONFIG.profile.year} ${CONFIG.profile.name} · Hosted on Cloudflare Pages`;

      // Set status pill
      if (CONFIG.status) {
        const pill = document.getElementById("statusPill");
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        pill.style.display = "flex";
        dot.className = `status-dot ${CONFIG.status.status === "offline" ? "offline" : ""}`;
        text.textContent = CONFIG.status.text;
      }

      // Render socials
      const socialsContainer = document.getElementById("socialLinks");
      CONFIG.socials.forEach(social => {
        const link = document.createElement("a");
        link.href = social.url;
        link.className = "social-icon";
        link.setAttribute("aria-label", social.label);
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
        link.textContent = social.icon;
        socialsContainer.appendChild(link);
      });

      // Render featured links
      const linksContainer = document.getElementById("linksContainer");
      if (CONFIG.featuredLinks.length > 0) {
        const featuredLabel = document.createElement("p");
        featuredLabel.className = "section-label";
        featuredLabel.textContent = "Featured";
        linksContainer.appendChild(featuredLabel);

        CONFIG.featuredLinks.forEach(link => {
          linksContainer.appendChild(createLinkCard(link, true));
        });
      }

      // Render regular links
      if (CONFIG.links.length > 0) {
        const linksLabel = document.createElement("p");
        linksLabel.className = "section-label";
        linksLabel.style.marginTop = "var(--space-2)";
        linksLabel.textContent = "Links";
        linksContainer.appendChild(linksLabel);

        CONFIG.links.forEach(link => {
          linksContainer.appendChild(createLinkCard(link, false));
        });
      }
    }

    function createLinkCard(linkData, isFeatured) {
      const card = document.createElement("a");
      card.href = linkData.url;
      card.className = isFeatured ? "link-card link-card--featured" : "link-card";
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.style.animationDelay = `${linkData.delay}s`;

      let copyButton = "";
      if (linkData.copyable) {
        copyButton = `
          <button type="button" class="copy-btn" title="${linkData.copyable.label}" aria-label="${linkData.copyable.label}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <path d="M15 2H9a1 1 0 0 0-1 1v2h8V3a1 1 0 0 0-1-1z"/>
            </svg>
          </button>
        `;
      }

      card.innerHTML = `
        <span class="link-icon" aria-hidden="true">${linkData.icon}</span>
        <span class="link-text">
          <span class="link-title">${linkData.title}</span>
          <span class="link-desc">${linkData.description}</span>
        </span>
        ${copyButton}
        <span class="link-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
      `;

      // Attach copy button handler if present
      if (linkData.copyable) {
        const copyBtn = card.querySelector(".copy-btn");
        copyBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          copyToClipboard(linkData.copyable.value);
        });
      }

      // Copy link to clipboard on middle-click or Ctrl+Click
      card.addEventListener("mousedown", (e) => {
        if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey))) {
          e.preventDefault();
          copyToClipboard(linkData.url);
        }
      });

      return card;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const feedback = document.getElementById("copyFeedback");
        feedback.classList.add("show");
        setTimeout(() => feedback.classList.remove("show"), 2000);
      }).catch(() => {
        // Fallback for older browsers
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        const feedback = document.getElementById("copyFeedback");
        feedback.classList.add("show");
        setTimeout(() => feedback.classList.remove("show"), 2000);
      });
    }

    // Theme toggle
    function initTheme() {
      const toggle = document.getElementById("themeToggle");
      const root = document.documentElement;
      const savedTheme = localStorage.getItem("site-theme") || 
        (matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

      function setTheme(theme) {
        root.setAttribute("data-theme", theme);
        toggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
        toggle.setAttribute("aria-pressed", theme === "dark");
        try {
          localStorage.setItem("site-theme", theme);
        } catch (e) {
          // Storage may be unavailable
        }
      }

      setTheme(savedTheme);
      toggle.addEventListener("click", () => {
        const currentTheme = root.getAttribute("data-theme");
        setTheme(currentTheme === "dark" ? "light" : "dark");
      });
    }

    // Initialize on page load
    document.addEventListener("DOMContentLoaded", () => {
      initPage();
      initTheme();
    });
  </script>
</body>
</html>
