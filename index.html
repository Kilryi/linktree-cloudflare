<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kieran · @vulkyri</title>
  <meta name="description" content="Kieran's links — developer, creator, and builder. Find me everywhere as @vulkyri." />
  <link rel="canonical" href="https://vulkyri.com/" />
  <meta name="theme-color" content="#0f0f0e" />
  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Kieran · @vulkyri" />
  <meta property="og:description" content="Kieran's links — developer, creator, and builder. Find me everywhere as @vulkyri." />
  <meta property="og:url" content="https://vulkyri.com/" />
  <meta property="og:image" content="https://vulkyri.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@vulkyri" />
  <meta name="twitter:title" content="Kieran · @vulkyri" />
  <meta name="twitter:description" content="Kieran's links — developer, creator, and builder. Find me everywhere as @vulkyri." />
  <meta name="twitter:image" content="https://vulkyri.com/og-image.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root,[data-theme="light"]{--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#7a797[...]
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- Theme toggle: icon reflects current mode (moon = dark active, sun = light active) -->
  <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" aria-pressed="true">
    <!-- Moon icon (shown when dark mode is active) -->
    <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <!-- Sun icon (shown when light mode is active) -->
    <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.[...]
  </button>

  <div class="copy-feedback" id="copyFeedback" role="status" aria-live="polite" aria-atomic="true">Copied to clipboard!</div>

  <main class="page" id="main" role="main">
    <!-- ================================================================
         PROFILE SECTION
         ================================================================ -->
    <section class="profile" aria-label="Profile">
      <!-- STATUS PILL: driven by CONFIG.status below -->
      <div id="statusPill" class="status-pill" style="display:none;">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText"></span>
      </div>

      <div class="avatar-ring">
        <!-- Replace emoji with <img src="/avatar.jpg" alt="Kieran"> once you have a photo -->
        <div class="avatar" role="img" aria-label="Kieran's profile picture">🦊</div>
      </div>
      <div>
        <h1 class="profile-name" id="profileName">Kieran</h1>
        <p class="profile-handle" id="profileHandle">@vulkyri</p>
      </div>
      <p class="profile-bio" id="profileBio">Developer · Creator · Builder. Find me everywhere as @vulkyri.</p>
      <div class="socials" aria-label="Social profiles" id="socialLinks">
        <!-- Socials generated from CONFIG.socials -->
      </div>
    </section>

    <div class="divider" role="separator"></div>

    <!-- ================================================================
         LINKS SECTION: driven by CONFIG.featuredLinks and CONFIG.links
         ================================================================ -->
    <nav class="links" id="linksContainer" aria-label="Kieran's links">
      <!-- Links generated from config -->
    </nav>

    <footer class="footer" role="contentinfo">
      <p id="footerText">© 2026 Kieran · vulkyri.com</p>
    </footer>
  </main>

  <!-- Structured data for search engines -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Kieran",
      "url": "https://vulkyri.com/",
      "sameAs": [
        "https://twitter.com/vulkyri",
        "https://github.com/vulkyri",
        "https://linkedin.com/in/vulkyri",
        "https://instagram.com/vulkyri"
      ]
    }
  </script>

  <script>
    /* ================================================================
     * 🎨 EDIT ME: Configuration
     * ================================================================
     * Edit the CONFIG object below. Everything else is auto-generated.
     */

    const CONFIG = {
      // Profile information
      profile: {
        name: "Kieran",
        handle: "@vulkyri",
        bio: "Developer · Creator · Builder. Find me everywhere as @vulkyri.",
        avatar: "🦊", // Replace with an image URL string to use a photo, e.g. "/avatar.jpg"
        year: new Date().getFullYear(),
      },

      // Status indicator (pill above avatar)
      // Set to null to hide, or { status: 'online'|'offline', text: 'Your text' }
      status: { status: "online", text: "Open to opportunities" },

      // Social links — update URLs to your real profiles
      socials: [
        { icon: "𝕏",  label: "X / Twitter",  url: "https://twitter.com/vulkyri" },
        { icon: "🐙", label: "GitHub",        url: "https://github.com/vulkyri" },
        { icon: "💼", label: "LinkedIn",      url: "https://linkedin.com/in/vulkyri" },
        { icon: "📷", label: "Instagram",     url: "https://instagram.com/vulkyri" },
      ],

      // Featured links (appear first with accent styling)
      featuredLinks: [
        {
          title: "vulkyri.com",
          description: "My home on the internet",
          icon: "🌐",
          url: "https://vulkyri.com/",
          delay: 0.05,
        },
      ],

      // Regular links
      links: [
        {
          title: "GitHub",
          description: "Projects, repos & open source",
          icon: "🐙",
          url: "https://github.com/vulkyri",
          delay: 0.1,
          copyable: { value: "@vulkyri", label: "Copy username" },
        },
        {
          title: "X / Twitter",
          description: "Thoughts & updates",
          icon: "𝕏",
          url: "https://twitter.com/vulkyri",
          delay: 0.15,
          copyable: { value: "@vulkyri", label: "Copy handle" },
        },
        {
          title: "LinkedIn",
          description: "Professional profile",
          icon: "💼",
          url: "https://linkedin.com/in/vulkyri",
          delay: 0.2,
        },
        {
          title: "Instagram",
          description: "Photos & life updates",
          icon: "📷",
          url: "https://instagram.com/vulkyri",
          delay: 0.25,
        },
      ],
    };

    /* ================================================================
     * Page Initialization — no need to edit below this line
     * ================================================================ */

    (function () {
      function initPage() {
        document.getElementById("profileName").textContent = CONFIG.profile.name;
        document.getElementById("profileHandle").textContent = CONFIG.profile.handle;
        document.getElementById("profileBio").textContent = CONFIG.profile.bio;
        document.getElementById("footerText").textContent =
          "\u00A9 " + CONFIG.profile.year + " " + CONFIG.profile.name + " \u00B7 vulkyri.com";

        if (CONFIG.status) {
          const pill = document.getElementById("statusPill");
          const dot  = document.getElementById("statusDot");
          const txt  = document.getElementById("statusText");
          pill.style.display = "flex";
          dot.className = "status-dot" + (CONFIG.status.status === "offline" ? " offline" : "");
          txt.textContent = CONFIG.status.text;
        }

        const socialsContainer = document.getElementById("socialLinks");
        CONFIG.socials.forEach(function (social) {
          const a = document.createElement("a");
          a.href = social.url;
          a.className = "social-icon";
          a.setAttribute("aria-label", social.label);
          a.setAttribute("target", "_blank");
          a.setAttribute("rel", "noopener noreferrer");
          a.textContent = social.icon;
          socialsContainer.appendChild(a);
        });

        const linksContainer = document.getElementById("linksContainer");
        if (CONFIG.featuredLinks.length > 0) {
          const fl = document.createElement("p");
          fl.className = "section-label";
          fl.textContent = "Featured";
          linksContainer.appendChild(fl);
          CONFIG.featuredLinks.forEach(function (link) {
            linksContainer.appendChild(createLinkCard(link, true));
          });
        }
        if (CONFIG.links.length > 0) {
          const ll = document.createElement("p");
          ll.className = "section-label";
          ll.style.marginTop = "var(--space-2)";
          ll.textContent = "Links";
          linksContainer.appendChild(ll);
          CONFIG.links.forEach(function (link) {
            linksContainer.appendChild(createLinkCard(link, false));
          });
        }
      }

      function createLinkCard(linkData, isFeatured) {
        // Create outer card container (not an <a> to avoid nesting interactive elements)
        const card = document.createElement("div");
        card.className = isFeatured ? "link-card link-card--featured" : "link-card";
        card.style.animationDelay = linkData.delay + "s";

        // Create main link (the clickable URL target)
        const link = document.createElement("a");
        link.href = linkData.url;
        link.className = "link-card__link";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.setAttribute("aria-label", linkData.title + " — " + linkData.description);

        link.innerHTML =
          "<span class=\"link-icon\" aria-hidden=\"true\">" + linkData.icon + "</span>" +
          "<span class=\"link-text\">" +
            "<span class=\"link-title\">" + linkData.title + "</span>" +
            "<span class=\"link-desc\">" + linkData.description + "</span>" +
          "</span>" +
          "<span class=\"link-arrow\" aria-hidden=\"true\">" +
            "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">" +
            "<path d=\"M5 12h14M12 5l7 7-7 7\"/></svg>" +
          "</span>";

        card.appendChild(link);

        // Optional copy button (separate from the anchor to avoid invalid nesting)
        if (linkData.copyable) {
          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "copy-btn";
          copyBtn.title = linkData.copyable.label;
          copyBtn.setAttribute("aria-label", linkData.copyable.label);

          copyBtn.innerHTML =
            "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">" +
            "<path d=\"M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2\"/>" +
            "<path d=\"M15 2H9a1 1 0 0 0-1 1v2h8V3a1 1 0 0 0-1-1z\"/>" +
            "</svg>";

          copyBtn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            copyToClipboard(linkData.copyable.value);
          });

          card.appendChild(copyBtn);
        }

        // Make the whole card keyboard-activatable (Enter/Space) — activates link
        card.tabIndex = 0;
        card.setAttribute("role", "group");
        card.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            link.click();
          }
        });

        // Middle-click / ctrl/meta + click behavior: copy the URL instead of navigating
        link.addEventListener("mousedown", function (e) {
          if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey))) {
            e.preventDefault();
            copyToClipboard(linkData.url);
          }
        });

        return card;
      }

      function copyToClipboard(text) {
        var feedback = document.getElementById("copyFeedback");
        function showFeedback() {
          feedback.classList.add("show");
          setTimeout(function () { feedback.classList.remove("show"); }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(showFeedback).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
        function fallbackCopy() {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try { document.execCommand("copy"); } catch (e) {}
          document.body.removeChild(ta);
          showFeedback();
        }
      }

      // Theme toggle — swaps moon/sun icon to match actual theme state
      function initTheme() {
        var toggle  = document.getElementById("themeToggle");
        var root    = document.documentElement;
        var moon    = document.getElementById("iconMoon");
        var sun     = document.getElementById("iconSun");
        var saved   = null;
        try { saved = localStorage.getItem("site-theme"); } catch (e) {}
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");

        function applyTheme(t) {
          root.setAttribute("data-theme", t);
          var isDark = t === "dark";
          toggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
          toggle.setAttribute("aria-pressed", String(isDark));
          moon.style.display = isDark ? "" : "none";
          sun.style.display  = isDark ? "none" : "";
          try { localStorage.setItem("site-theme", t); } catch (e) {}
        }

        applyTheme(theme);
        toggle.addEventListener("click", function () {
          applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        initPage();
        initTheme();
      });
    })();
  </script>
</body>
</html>
