-interactive);overflow:hidden;cursor:pointer;user-select:none;text-decoration:none;color:inherit}.link-card::before{content:'';position:absolute;inset:0;opacity:0;background:oklch(from var(--color-primary) l c h / 0.05);transition:opacity var(--transition-interactive)}.link-card:hover{background:var(--color-surface-2);border-color:oklch(from var(--color-text) l c h / 0.14);box-shadow:var(--shadow-md);transform:translateY(-1px)}.link-card:active{background:oklch(from var(--color-surface) l c h / 0.85);transform:translateY(0);box-shadow:var(--shadow-sm)}.link-card:hover::before{opacity:1}.link-card:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}.link-card-content{display:flex;align-items:center;gap:var(--space-4);flex:1;min-width:0}.link-icon{position:relative;z-index:1;width:40px;height:40px;min-width:40px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:oklch(from var(--color-primary) l c h / 0.1);color:var(--color-primary);flex-shrink:0}.link-icon svg{width:20px;height:20px}.link-text{flex:1;min-width:0;position:relative;z-index:1;text-align:left}.link-title{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}.link-badge{display:inline-block;margin-left:var(--space-2);font-size:var(--text-xs);padding:2px 6px;background:oklch(from var(--color-primary) l c h / 0.15);color:var(--color-primary);border-radius:var(--radius-sm);font-weight:600}.link-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}.link-arrow{position:relative;z-index:1;color:var(--color-text-faint);transition:color var(--transition-interactive),transform var(--transition-interactive);flex-shrink:0}.link-card:hover .link-arrow{color:var(--color-primary);transform:translateX(2px)}.link-arrow svg{width:16px;height:16px}.link-card--featured{border-color:oklch(from <body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- Header Controls -->
  <div class="header-controls">
    <!-- Theme Selector -->
    <select id="themeSelector" class="theme-selector" aria-label="Color theme selector">
      <option value="original">Original</option>
      <option value="cyberpunk">Cyberpunk</option>
      <option value="minimal">Minimal</option>
      <option value="sunset">Sunset</option>
    </select>

    <!-- Theme Toggle (Dark/Light) -->
    <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" aria-pressed="true">
      <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <div class="copy-feedback" id="copyFeedback" role="status" aria-live="polite" aria-atomic="true">Copied to clipboard!</div>

  <main class="page" id="main" role="main">
    <!-- ================================================================
         PROFILE SECTION
         ================================================================ -->
    <section class="profile" aria-label="Profile">
      <!-- STATUS PILL: driven by CONFIG.status below -->
      <div id="statusPill" class="status-pill" style="display:none;">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText"></span>
      </div>

      <div class="avatar-ring">
        <div class="avatar" role="img" aria-label="Kieran's profile picture">🦊</div>
      </div>
      <div>
        <h1 class="profile-name" id="profileName">Kieran</h1>
        <p class="profile-handle" id="profileHandle">@vulkyri</p>
      </div>
      <p class="profile-bio" id="profileBio">Developer · Creator · Builder. Find me everywhere as @vulkyri.</p>
      <div class="socials" aria-label="Social profiles" id="socialLinks">
        <!-- Socials generated from CONFIG.socials -->
      </div>
    </section>

    <div class="divider" role="separator"></div>

    <!-- ================================================================
         SEARCH SECTION
         ================================================================ -->
    <div class="search-container" id="searchContainer" style="display:none;">
      <input type="text" id="searchInput" class="search-input" placeholder="Search links..." aria-label="Search links">
    </div>

    <!-- ================================================================
         LINKS SECTION: driven by CONFIG.featuredLinks and CONFIG.links
         ================================================================ -->
    <nav class="links" id="linksContainer" aria-label="Kieran's links">
      <!-- Links generated from config -->
    </nav>

    <footer class="footer" role="contentinfo">
      <p id="footerText">© 2026 Kieran · vulkyri.com</p>
      <p id="lastUpdated" style="margin-top: var(--space-2); font-size: var(--text-xs);"></p>
      <div class="qr-code" id="qrCode"></div>
    </footer>
  </main>

  <!-- Structured data for search engines -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Kieran",
      "url": "https://vulkyri.com/",
      "sameAs": [
        "https://twitter.com/vulkyri",
        "https://github.com/vulkyri",
        "https://linkedin.com/in/vulkyri",
        "https://instagram.com/vulkyri"
      ]
    }
  </script>

  <script>
    /* ================================================================
     * 🎨 EDIT ME: Configuration
     * ================================================================
     * Edit the CONFIG object below. Everything else is auto-generated.
     */

    const CONFIG = {
      // Profile information
      profile: {
        name: "Kieran",
        handle: "@vulkyri",
        bio: "Developer · Creator · Builder. Find me everywhere as @vulkyri.",
        avatar: "🦊",
        year: new Date().getFullYear(),
      },

      // Status indicator (pill above avatar)
      // Set to null to hide, or { status: 'online'|'offline', text: 'Your text' }
      status: { status: "online", text: "Open to opportunities" },

      // Social links — update URLs to your real profiles
      socials: [
        { icon: "𝕏",  label: "X / Twitter",  url: "https://twitter.com/vulkyri" },
        { icon: "🐙", label: "GitHub",        url: "https://github.com/vulkyri" },
        { icon: "💼", label: "LinkedIn",      url: "https://linkedin.com/in/vulkyri" },
        { icon: "📷", label: "Instagram",     url: "https://instagram.com/vulkyri" },
      ],

      // Featured links (appear first with accent styling)
      featuredLinks: [
        {
          title: "vulkyri.com",
          description: "My home on the internet",
          icon: "🌐",
          url: "https://vulkyri.com/",
          delay: 0.05,
          visible: true,
          badge: null, // "New", "Coming Soon", "Limited Time"
        },
      ],

      // Regular links with enhanced options
      links: [
        {
          title: "GitHub",
          description: "Projects, repos & open source",
          icon: "🐙",
          url: "https://github.com/vulkyri",
          delay: 0.1,
          copyable: { value: "@vulkyri", label: "Copy username" },
          visible: true,
          badge: null,
          visibleFrom: null, // "2026-01-01"
          visibleUntil: null, // "2026-12-31"
        },
        {
          title: "X / Twitter",
          description: "Thoughts & updates",
          icon: "𝕏",
          url: "https://twitter.com/vulkyri",
          delay: 0.15,
          copyable: { value: "@vulkyri", label: "Copy handle" },
          visible: true,
          badge: null,
        },
        {
          title: "LinkedIn",
          description: "Professional profile",
          icon: "💼",
          url: "https://linkedin.com/in/vulkyri",
          delay: 0.2,
          visible: true,
          badge: null,
        },
        {
          title: "Instagram",
          description: "Photos & life updates",
          icon: "📷",
          url: "https://instagram.com/vulkyri",
          delay: 0.25,
          visible: true,
          badge: null,
        },
      ],

      // Features
      features: {
        qrCode: true,
        search: true,
        analytics: false, // Set to GA_MEASUREMENT_ID if using Google Analytics
        trackClicks: true,
        lastUpdated: "2026-06-11",
      },

      // Color themes
      themes: {
        original: {
          name: "Original",
          primary: "#0066ff",
          primaryLight: "#e6f0ff",
        },
        cyberpunk: {
          name: "Cyberpunk",
          primary: "#ff00ff",
          primaryLight: "#ff1493",
        },
        minimal: {
          name: "Minimal",
          primary: "#000000",
          primaryLight: "#333333",
        },
        sunset: {
          name: "Sunset",
          primary: "#ff6b35",
          primaryLight: "#ffa500",
        },
      },
    };

    /* ================================================================
     * Enhanced Page Initialization
     * ================================================================ */

    (function () {
      const STORAGE_KEYS = {
        theme: "site-theme",
        colorTheme: "color-theme",
        clickCounts: "link-clicks",
      };

      function initPage() {
        document.getElementById("profileName").textContent = CONFIG.profile.name;
        document.getElementById("profileHandle").textContent = CONFIG.profile.handle;
        document.getElementById("profileBio").textContent = CONFIG.profile.bio;
        document.getElementById("footerText").textContent =
          "\u00A9 " + CONFIG.profile.year + " " + CONFIG.profile.name + " \u00B7 vulkyri.com";

        // Last updated
        if (CONFIG.features.lastUpdated) {
          const lastUpdatedEl = document.getElementById("lastUpdated");
          const date = new Date(CONFIG.features.lastUpdated);
          lastUpdatedEl.textContent = "Last updated: " + date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
        }

        if (CONFIG.status) {
          const pill = document.getElementById("statusPill");
          const dot  = document.getElementById("statusDot");
          const txt  = document.getElementById("statusText");
          pill.style.display = "flex";
          dot.className = "status-dot" + (CONFIG.status.status === "offline" ? " offline" : "");
          txt.textContent = CONFIG.status.text;
        }

        const socialsContainer = document.getElementById("socialLinks");
        CONFIG.socials.forEach(function (social) {
          const a = document.createElement("a");
          a.href = social.url;
          a.className = "social-icon";
          a.setAttribute("aria-label", social.label);
          a.setAttribute("target", "_blank");
          a.setAttribute("rel", "noopener noreferrer");
          a.textContent = social.icon;
          socialsContainer.appendChild(a);
        });

        renderLinks();
        initSearch();
        initQRCode();
      }

      function isLinkVisible(link) {
        if (link.visible === false) return false;

        const now = new Date();
        if (link.visibleFrom) {
          const from = new Date(link.visibleFrom);
          if (now < from) return false;
        }
        if (link.visibleUntil) {
          const until = new Date(link.visibleUntil);
          if (now > until) return false;
        }
        return true;
      }

      function renderLinks(searchTerm = "") {
        const linksContainer = document.getElementById("linksContainer");
        linksContainer.innerHTML = "";

        let visibleFeatured = CONFIG.featuredLinks.filter(isLinkVisible);
        let visibleRegular = CONFIG.links.filter(isLinkVisible);

        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          visibleFeatured = visibleFeatured.filter(l => 
            l.title.toLowerCase().includes(term) || 
            l.description.toLowerCase().includes(term)
          );
          visibleRegular = visibleRegular.filter(l => 
            l.title.toLowerCase().includes(term) || 
            l.description.toLowerCase().includes(term)
          );
        }

        if (visibleFeatured.length > 0) {
          const fl = document.createElement("p");
          fl.className = "section-label";
          fl.textContent = "Featured";
          linksContainer.appendChild(fl);
          visibleFeatured.forEach(function (link) {
            linksContainer.appendChild(createLinkCard(link, true));
          });
        }

        if (visibleRegular.length > 0) {
          const ll = document.createElement("p");
          ll.className = "section-label";
          ll.style.marginTop = "var(--space-2)";
          ll.textContent = "Links";
          linksContainer.appendChild(ll);
          visibleRegular.forEach(function (link) {
            linksContainer.appendChild(createLinkCard(link, false));
          });
        }

        if (visibleFeatured.length === 0 && visibleRegular.length === 0 && searchTerm) {
          const noResults = document.createElement("p");
          noResults.style.textAlign = "center";
          noResults.style.color = "var(--color-text-muted)";
          noResults.style.marginTop = "var(--space-4)";
          noResults.textContent = "No links found matching \"" + searchTerm + "\"";
          linksContainer.appendChild(noResults);
        }
      }

      function createLinkCard(linkData, isFeatured) {
        const card = document.createElement("div");
        card.className = isFeatured ? "link-card link-card--featured" : "link-card";
        card.style.animationDelay = linkData.delay + "s";

        const link = document.createElement("a");
        link.href = linkData.url;
        link.className = "link-card-content";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.setAttribute("aria-label", linkData.title + " — " + linkData.description);

        const titleWithBadge = linkData.badge 
          ? "<span class=\"link-title\">" + linkData.title + "<span class=\"link-badge\">" + linkData.badge + "</span></span>"
          : "<span class=\"link-title\">" + linkData.title + "</span>";

        link.innerHTML =
          "<span class=\"link-icon\" aria-hidden=\"true\">" + linkData.icon + "</span>" +
          "<span class=\"link-text\">" +
            titleWithBadge +
            "<span class=\"link-desc\">" + linkData.description + "</span>" +
          "</span>" +
          "<span class=\"link-arrow\" aria-hidden=\"true\">" +
            "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">" +
            "<path d=\"M5 12h14M12 5l7 7-7 7\"/></svg>" +
          "</span>";

        card.appendChild(link);

        // Copy button (if copyable)
        if (linkData.copyable) {
          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "copy-btn";
          copyBtn.title = linkData.copyable.label;
          copyBtn.setAttribute("aria-label", linkData.copyable.label);

          copyBtn.innerHTML =
            "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">" +
            "<path d=\"M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2\"/>" +
            "<path d=\"M15 2H9a1 1 0 0 0-1 1v2h8V3a1 1 0 0 0-1-1z\"/>" +
            "</svg>";

          copyBtn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            copyToClipboard(linkData.copyable.value);
          });

          card.appendChild(copyBtn);
        }

        // Track clicks
        link.addEventListener("click", function () {
          if (CONFIG.features.trackClicks) {
            trackLinkClick(linkData.title);
          }
        });

        // Keyboard activation
        card.tabIndex = 0;
        card.setAttribute("role", "group");
        card.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            link.click();
          }
        });

        // Middle-click / meta-click copy
        link.addEventListener("mousedown", function (e) {
          if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey))) {
            e.preventDefault();
            copyToClipboard(linkData.url);
          }
        });

        return card;
      }

      function copyToClipboard(text) {
        var feedback = document.getElementById("copyFeedback");
        function showFeedback() {
          feedback.classList.add("show");
          setTimeout(function () { feedback.classList.remove("show"); }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(showFeedback).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
        function fallbackCopy() {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try { document.execCommand("copy"); } catch (e) {}
          document.body.removeChild(ta);
          showFeedback();
        }
      }

      function initSearch() {
        if (!CONFIG.features.search || (CONFIG.featuredLinks.length + CONFIG.links.length) < 5) {
          return;
        }

        const searchContainer = document.getElementById("searchContainer");
        const searchInput = document.getElementById("searchInput");
        searchContainer.style.display = "block";

        searchInput.addEventListener("input", function (e) {
          renderLinks(e.target.value);
        });
      }

      function trackLinkClick(title) {
        try {
          let clicks = JSON.parse(localStorage.getItem(STORAGE_KEYS.clickCounts)) || {};
          clicks[title] = (clicks[title] || 0) + 1;
          localStorage.setItem(STORAGE_KEYS.clickCounts, JSON.stringify(clicks));

          // Send to GA if enabled
          if (CONFIG.features.analytics && window.gtag) {
            gtag("event", "link_click", { link_title: title });
          }
        } catch (e) {}
      }

      function initQRCode() {
        if (!CONFIG.features.qrCode) return;

        const qrContainer = document.getElementById("qrCode");
        const pageUrl = encodeURIComponent(window.location.href);
        const qrImg = document.createElement("img");
        qrImg.src = "https://qrserver.com/api/render-qr-code/?size=120x120&data=" + pageUrl;
        qrImg.alt = "QR code to this page";
        qrContainer.appendChild(qrImg);
      }

      function applyColorTheme(themeName) {
        const theme = CONFIG.themes[themeName];
        if (!theme) return;

        const root = document.documentElement;
        root.style.setProperty("--color-primary", theme.primary);
        root.style.setProperty("--color-primary-light", theme.primaryLight);

        try {
          localStorage.setItem(STORAGE_KEYS.colorTheme, themeName);
        } catch (e) {}
      }

      function initThemes() {
        const themeSelector = document.getElementById("themeSelector");
        const savedColorTheme = localStorage.getItem(STORAGE_KEYS.colorTheme) || "original";

        themeSelector.value = savedColorTheme;
        applyColorTheme(savedColorTheme);

        themeSelector.addEventListener("change", function (e) {
          applyColorTheme(e.target.value);
        });
      }

      function initTheme() {
        var toggle  = document.getElementById("themeToggle");
        var root    = document.documentElement;
        var moon    = document.getElementById("iconMoon");
        var sun     = document.getElementById("iconSun");
        var saved   = null;
        try { saved = localStorage.getItem(STORAGE_KEYS.theme); } catch (e) {}
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");

        function applyTheme(t) {
          root.setAttribute("data-theme", t);
          var isDark = t === "dark";
          toggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
          toggle.setAttribute("aria-pressed", String(isDark));
          moon.style.display = isDark ? "" : "none";
          sun.style.display  = isDark ? "none" : "";
          try { localStorage.setItem(STORAGE_KEYS.theme, t); } catch (e) {}
        }

        applyTheme(theme);
        toggle.addEventListener("click", function () {
          applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");
        });
      }

      // Google Analytics (optional)
      function initAnalytics() {
        if (!CONFIG.features.analytics) return;
        const gaMeasurementId = CONFIG.features.analytics;
        const script = document.createElement("script");
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=" + gaMeasurementId;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag() {
          window.dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", gaMeasurementId);
      }

      document.addEventListener("DOMContentLoaded", function () {
        initTheme();
        initThemes();
        initAnalytics();
        initPage();
      });
    })();
  </script>
</body>
</html>
