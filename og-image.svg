<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0e"/>
      <stop offset="100%" style="stop-color:#1a1918"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6aa3ff"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Avatar ring -->
  <circle cx="600" cy="220" r="95" fill="url(#ring)"/>
  <circle cx="600" cy="220" r="88" fill="#1a1918"/>
  <text x="600" y="258" font-size="100" text-anchor="middle" font-family="system-ui">🦊</text>
  <!-- Name -->
  <text x="600" y="360" font-size="64" font-weight="700" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#e8e7e4" letter-spacing="-1">Kieran</text>
  <!-- Handle -->
  <text x="600" y="420" font-size="32" font-weight="500" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#6aa3ff">@vulkyri</text>
  <!-- Bio -->
  <text x="600" y="480" font-size="24" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#7a7876">Developer · Creator · Builder</text>
  <!-- URL pill -->
  <rect x="490" y="516" width="220" height="44" rx="22" fill="#1a2d4d" stroke="#6aa3ff" stroke-width="1" opacity="0.8"/>
  <text x="600" y="544" font-size="20" font-weight="600" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#6aa3ff">vulkyri.com</text>
</svg>
